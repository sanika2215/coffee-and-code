<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Owl's Here — The All Rounder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="all-rounder.css">
  </head>

  <body>
    <div class="noise"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <nav>
      <a href="/" class="back-link">
        <span class="arrow">&#8592;</span> Home
      </a>
    </nav>

    <main>
      <div class="badge">Est. 2026</div>

      <div class="owl-wrap">
        <div class="owl-ring"></div>
        <div class="owl-emoji">🦉</div>
      </div>

      <h1>
        <span class="title-top">Welcome the</span>
        <span class="title-main">All Rounder</span>
      </h1>

      <p class="tagline">Wise · Sharp · Unstoppable</p>

      <div class="divider">
        <span></span><span class="diamond">◆</span><span></span>
      </div>

      <div class="cards">
        <div class="card" style="--d:0.1s">
          <div class="card-icon">🎯</div>
          <div class="card-label">Precision</div>
        </div>
        <div class="card" style="--d:0.2s">
          <div class="card-icon">⚡</div>
          <div class="card-label">Speed</div>
        </div>
        <div class="card" style="--d:0.3s">
          <div class="card-icon">🌙</div>
          <div class="card-label">Vision</div>
        </div>
      </div>
    </main>

    <footer>
      <p>Owl's Here &copy; 2026 — All rights reserved</p>
    </footer>
  </body>
</html>
